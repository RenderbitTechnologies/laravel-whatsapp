name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [8.1, 8.2, 8.3, 8.4]
        laravel: [10, 11]
        include:
          - laravel: 10
            illuminate: ^10.0
            testbench: ^8.0
            phpunit: ^10
          - laravel: 11
            illuminate: ^11.0
            testbench: ^9.0
            phpunit: ^11.0
        exclude:
          - php: 8.1
            laravel: 11
          - php: 8.4
            laravel: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v6
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.json') }}-${{ matrix.laravel }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Laravel ${{ matrix.laravel }} dependencies
        run: |
          composer require illuminate/support:${{ matrix.illuminate }} --no-update --no-interaction
          composer require --dev orchestra/testbench:${{ matrix.testbench }} phpunit/phpunit:${{ matrix.phpunit }} --no-update --no-interaction
          COMPOSER_POLICY_ADVISORIES_BLOCK=false composer update --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
